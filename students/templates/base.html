
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
body{
    background:#f8f9fa;
    color:#000;
    transition:0.3s;
}

.dark-mode{
    background:#121212;
    color:#fff;
}

.dark-mode .card{
    background:#1e1e1e;
    color:white;
}

.dark-mode .table{
    color:white;
}

.dark-mode .table-dark{
    background:#000;
}

.dark-mode .navbar{
    background:#000 !important;
}

.dark-mode .form-control{
    background:#2c2c2c;
    color:white;
    border:1px solid #555;
}

.dark-mode .form-control::placeholder{
    color:#ccc;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="{% url 'student_list' %}">
            Student Management System
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'student_list' %}">Home </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'add_student' %}">Add Student</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-warning">Welcome, {{ user.username }}</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-danger ms-2" href="{% url 'logout' %}">Logout</a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-success" href="{% url 'profile' %}">Profile</a>
                </li>
                
                {% else %}

                <li class="nav-item">
                    <a class="btn btn-success"href="{% url 'login' %}">Login</a>
                </li>
                    <a href="{% url 'register' %}" class="btn btn-primary me-2"> Register</a>
                {% endif %}

                <button class="btn btn-outline-light" onclick="toggleTheme()">
                    🌙 Dark Mode
                </button>
            </ul>
        </div>
    </div>
</nav>
<!-- Main Container -->
<div class="container mt-5">

    {% block content %}
    
    {% endblock %}

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleTheme() {
    document.body.classList.toggle("dark-mode");

    if (document.body.classList.contains("dark-mode")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
    }
}
</script>
</body>
</html>
