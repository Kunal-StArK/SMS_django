
{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h3 class="text-center">Edit Student</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roll Number</label>
                        <input type="number"  name="roll_no" class="form-control" value="{{ student.roll_no }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" value="{{ student.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone" class="form-control" value="{{ student.phone }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Course</label>
                        <input type="text" name="course" class="form-control" value="{{ student.course }}" required>
                    </div>
                    <div class="d-flex justify-content-between"> <a href="{% url 'student_list' %}"class="btn btn-secondary"> Back</a>
                        <button type="submit"class="btn btn-warning"> Update Student </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
