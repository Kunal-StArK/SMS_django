{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center">Register</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Register
            </button>
        </form>

        <p class="mt-3">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>
</div>

{% endblock %}
