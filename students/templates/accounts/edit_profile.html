{% extends 'base.html' %}

{% block content %}


<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning text-white text-center">
                    <h3>Edit Profile</h3>
                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input
                                type="text"
                                class="form-control"
                                name="username"
                                value="{{ request.user.username }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="first_name"
                                value="{{ request.user.first_name }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="last_name"
                                value="{{ request.user.last_name }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input
                                type="email"
                                class="form-control"
                                name="email"
                                value="{{ request.user.email }}">
                        </div>

                        <button class="btn btn-primary w-100">
                            Update Profile
                        </button>

                    </form>

                    <hr>

                    <a href="{% url 'profile' %}" class="btn btn-success w-100">
                        Back to Profile
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>



</body>


{% endblock %}
